<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブロック崩し</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
      overflow: hidden;
    }

    #wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #hud {
      display: flex;
      gap: 40px;
      font-size: 14px;
      letter-spacing: 2px;
      color: #8888cc;
      width: 480px;
      justify-content: space-between;
    }

    #hud span {
      color: #fff;
      font-weight: bold;
    }

    #game-canvas {
      display: block;
      border: 2px solid #4a4a8a;
      box-shadow: 0 0 40px rgba(100, 100, 255, 0.3);
      cursor: none;
    }

    #hint {
      font-size: 11px;
      color: #555588;
      letter-spacing: 1px;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 10;
    }

    #overlay h1 {
      font-size: 42px;
      color: #fff;
      text-shadow: 0 0 24px rgba(150,150,255,0.8);
      letter-spacing: 6px;
    }

    #overlay .sub {
      color: #aaaacc;
      font-size: 13px;
      letter-spacing: 2px;
    }

    #overlay .result-score {
      font-size: 22px;
      color: #ffcc44;
    }

    #start-btn {
      padding: 12px 44px;
      background: linear-gradient(135deg, #4a4aaa, #6a4aff);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 3px;
      box-shadow: 0 4px 18px rgba(100,100,255,0.45);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(100,100,255,0.65);
    }
  </style>
</head>
<body>
<div id="wrapper">
  <div id="hud">
    <div>SCORE <span id="score-display">0</span></div>
    <div>LEVEL <span id="level-display">1</span></div>
    <div>LIVES <span id="lives-display">♥ ♥ ♥</span></div>
  </div>
  <canvas id="game-canvas" width="480" height="560"></canvas>
  <div id="hint">マウス or ← → キーでパドル操作 | Space でボール発射</div>
</div>

<div id="overlay">
  <h1>BREAKOUT</h1>
  <div class="sub">ブロック崩し</div>
  <button id="start-btn">START</button>
</div>

<script>
const W = 480, H = 560;
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// ── Audio ────────────────────────────────────────────────
const ac = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type = 'square', vol = 0.15) {
  const osc = ac.createOscillator(), gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  osc.start(); osc.stop(ac.currentTime + dur);
}

// ── Constants ────────────────────────────────────────────
const PAD_W = 80, PAD_H = 12, PAD_Y = H - 40;
const BALL_R = 7;
const BLOCK_COLS = 10, BLOCK_ROWS = 6;
const BLOCK_W = 42, BLOCK_H = 18, BLOCK_PAD = 4;
const BLOCK_OFFSET_X = (W - (BLOCK_COLS * (BLOCK_W + BLOCK_PAD) - BLOCK_PAD)) / 2;
const BLOCK_OFFSET_Y = 52;
const ITEM_R = 12, ITEM_SPEED = 2, ITEM_CHANCE = 0.15;
const MAX_BALLS = 8;

const ROW_DATA = [
  { color: '#ff4466', pts: 70, hp: 2 },
  { color: '#ff8844', pts: 50, hp: 1 },
  { color: '#ffcc44', pts: 40, hp: 1 },
  { color: '#44ff88', pts: 30, hp: 1 },
  { color: '#44ccff', pts: 20, hp: 1 },
  { color: '#8866ff', pts: 10, hp: 1 },
];

// ── State ────────────────────────────────────────────────
let paddle, balls, blocks, items, score, lives, level, state, animFrame;
let keys = {}, mousePadX = W / 2, flashTimer = 0, levelupTimer = 0;
let particles = [];

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mousePadX = e.clientX - rect.left;
});
canvas.addEventListener('click', () => { if (state === 'ready') launch(); });
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

// ── Helpers ──────────────────────────────────────────────
function makeBall(x, y, speed) {
  return { x, y, px: x, py: y, vx: 0, vy: 0, speed, attached: true };
}

function initLevel() {
  const speed = 3.5 + (level - 1) * 0.4;
  paddle = { x: W / 2, w: PAD_W };
  balls  = [makeBall(W / 2, PAD_Y - BALL_R - 2, speed)];
  items  = [];
  blocks = [];
  for (let row = 0; row < BLOCK_ROWS; row++) {
    const rd = ROW_DATA[row];
    for (let col = 0; col < BLOCK_COLS; col++) {
      blocks.push({
        x: BLOCK_OFFSET_X + col * (BLOCK_W + BLOCK_PAD),
        y: BLOCK_OFFSET_Y + row * (BLOCK_H + BLOCK_PAD),
        w: BLOCK_W, h: BLOCK_H,
        color: rd.color, pts: rd.pts, hp: rd.hp, maxHp: rd.hp, alive: true,
      });
    }
  }
  state = 'ready';
}

function launch() {
  const ab = balls.find(b => b.attached);
  if (!ab) return;
  const sign = Math.random() < 0.5 ? 1 : -1;
  const angle = Math.PI / 4 + Math.random() * Math.PI / 4;
  ab.vx = sign * Math.cos(angle) * ab.speed;
  ab.vy = -Math.sin(angle) * ab.speed;
  ab.attached = false;
  state = 'playing';
}

function startGame() {
  score = 0; lives = 3; level = 1; particles = [];
  updateHUD(); initLevel();
  document.getElementById('overlay').style.display = 'none';
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(gameLoop);
}

function updateHUD() {
  document.getElementById('score-display').textContent = score.toLocaleString();
  document.getElementById('level-display').textContent = level;
  document.getElementById('lives-display').textContent = '♥ '.repeat(lives).trim() || '×';
}

// ── Particles ────────────────────────────────────────────
function spawnParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2, s = Math.random() * 3 + 1;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, color });
  }
}
function updateParticles() {
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.03; }
  particles = particles.filter(p => p.life > 0);
}

// ── Ball update (one ball) ───────────────────────────────
function updateOneBall(ball) {
  if (ball.attached) { ball.x = paddle.x; ball.px = ball.x; ball.py = ball.y; return; }

  ball.px = ball.x; ball.py = ball.y;
  ball.x += ball.vx; ball.y += ball.vy;

  // walls
  if (ball.x - BALL_R < 0) { ball.x = BALL_R;    ball.vx =  Math.abs(ball.vx); beep(220, 0.04); }
  if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); beep(220, 0.04); }
  if (ball.y - BALL_R < 0) { ball.y = BALL_R;     ball.vy =  Math.abs(ball.vy); beep(220, 0.04); }

  // paddle
  if (ball.vy > 0 &&
      ball.y + BALL_R >= PAD_Y && ball.y - BALL_R <= PAD_Y + PAD_H &&
      ball.x >= paddle.x - paddle.w / 2 && ball.x <= paddle.x + paddle.w / 2) {
    const rel = (ball.x - paddle.x) / (paddle.w / 2);
    const spd = Math.hypot(ball.vx, ball.vy);
    ball.vx = Math.sin(rel * Math.PI / 3) * spd;
    ball.vy = -Math.abs(Math.cos(rel * Math.PI / 3) * spd);
    ball.y = PAD_Y - BALL_R;
    beep(330, 0.08); flashTimer = 4;
  }

  // blocks – AABB-circle collision with previous-position-based reflection
  for (const b of blocks) {
    if (!b.alive) continue;

    // nearest point on block to ball center
    const nearX = Math.max(b.x, Math.min(ball.x, b.x + b.w));
    const nearY = Math.max(b.y, Math.min(ball.y, b.y + b.h));
    const dx = ball.x - nearX, dy = ball.y - nearY;
    if (dx*dx + dy*dy > BALL_R * BALL_R) continue;

    // damage
    b.hp--;
    if (b.hp <= 0) {
      b.alive = false;
      score += b.pts * level;
      spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color);
      beep(440 + b.pts * 2, 0.07, 'triangle');
      if (Math.random() < ITEM_CHANCE) items.push({ x: b.x + b.w/2, y: b.y + b.h/2, vy: ITEM_SPEED });
    } else {
      beep(300, 0.05, 'triangle', 0.1);
    }
    updateHUD();

    // reflection: use previous position to detect which axis was entered
    const prevNearX = Math.max(b.x, Math.min(ball.px, b.x + b.w));
    const prevNearY = Math.max(b.y, Math.min(ball.py, b.y + b.h));
    const pdx = ball.px - prevNearX, pdy = ball.py - prevNearY;
    const wasOutX = pdx * pdx >= BALL_R * BALL_R; // was outside on X axis
    const wasOutY = pdy * pdy >= BALL_R * BALL_R;

    if (wasOutX && !wasOutY)       ball.vx = -ball.vx; // entered from side
    else if (!wasOutX && wasOutY)  ball.vy = -ball.vy; // entered from top/bottom
    else {
      // corner or fast pass-through: use smallest penetration depth
      const penetX = b.w/2 + BALL_R - Math.abs(ball.x - (b.x + b.w/2));
      const penetY = b.h/2 + BALL_R - Math.abs(ball.y - (b.y + b.h/2));
      if (penetX < penetY) ball.vx = -ball.vx;
      else                 ball.vy = -ball.vy;
    }
    break;
  }
}

// ── Update ───────────────────────────────────────────────
function update(dt) {
  if (state === 'levelup') {
    levelupTimer -= dt;
    if (levelupTimer <= 0) { level++; updateHUD(); initLevel(); }
    return;
  }

  if (keys['ArrowLeft'])  mousePadX -= 6;
  if (keys['ArrowRight']) mousePadX += 6;
  if ((keys[' '] || keys['Space']) && state === 'ready') launch();
  paddle.x = Math.max(paddle.w/2, Math.min(W - paddle.w/2, mousePadX));

  for (const ball of balls) updateOneBall(ball);

  // remove fallen balls (only non-attached ones that left the screen)
  balls = balls.filter(b => b.attached || b.y - BALL_R <= H);

  if (balls.length === 0) {
    lives--; updateHUD();
    beep(110, 0.4, 'sawtooth', 0.2);
    items = [];
    if (lives <= 0) { state = 'dead'; setTimeout(showGameOver, 800); return; }
    const speed = 3.5 + (level - 1) * 0.4;
    balls = [makeBall(paddle.x, PAD_Y - BALL_R - 2, speed)];
    state = 'ready';
    return;
  }

  // items falling
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.y += item.vy;
    if (item.y > H + 20) { items.splice(i, 1); continue; }

    // paddle catch
    if (item.y + ITEM_R >= PAD_Y && item.y - ITEM_R <= PAD_Y + PAD_H &&
        item.x + ITEM_R >= paddle.x - paddle.w/2 &&
        item.x - ITEM_R <= paddle.x + paddle.w/2) {
      items.splice(i, 1);
      // duplicate all live (non-attached) balls, up to MAX_BALLS
      const liveBalls = balls.filter(b => !b.attached);
      const slots = MAX_BALLS - balls.length;
      const toAdd = liveBalls.slice(0, slots).map(b => ({
        x: b.x, y: b.y, px: b.x, py: b.y,
        vx: -b.vx, vy: b.vy, speed: b.speed, attached: false,
      }));
      balls.push(...toAdd);
      beep(880, 0.08, 'sine', 0.2); beep(1100, 0.12, 'sine', 0.15);
    }
  }

  if (blocks.every(b => !b.alive)) {
    beep(660, 0.1); beep(880, 0.1); beep(1100, 0.2);
    state = 'levelup'; levelupTimer = 1200;
  }

  updateParticles();
  if (flashTimer > 0) flashTimer--;
}

// ── Draw ─────────────────────────────────────────────────
function drawRoundRect(x, y, w, h, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
}

function draw() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(255,255,255,0.025)'; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 24) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 24) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // blocks
  for (const b of blocks) {
    if (!b.alive) continue;
    ctx.globalAlpha = b.hp < b.maxHp ? 0.45 : 1;
    drawRoundRect(b.x, b.y, b.w, b.h, 3, b.color);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.roundRect(b.x+2, b.y+2, b.w-4, 4, 2); ctx.fill();
    if (b.hp < b.maxHp) {
      ctx.globalAlpha = 0.5; ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(b.x + b.w*0.3, b.y + 2);
      ctx.lineTo(b.x + b.w*0.5, b.y + b.h/2);
      ctx.lineTo(b.x + b.w*0.7, b.y + b.h - 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // particles
  for (const p of particles) {
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // items (×2 power-up)
  for (const item of items) {
    ctx.shadowColor = '#ffee44'; ctx.shadowBlur = 16;
    const g = ctx.createRadialGradient(item.x-3, item.y-3, 1, item.x, item.y, ITEM_R);
    g.addColorStop(0, '#fff176'); g.addColorStop(1, '#ff8c00');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(item.x, item.y, ITEM_R, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#1a0800'; ctx.font = 'bold 9px Courier New';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('×2', item.x, item.y);
    ctx.textBaseline = 'alphabetic';
  }

  // paddle
  const padX = paddle.x - paddle.w/2;
  if (flashTimer > 0) { ctx.shadowColor = '#88aaff'; ctx.shadowBlur = 16; }
  const pg = ctx.createLinearGradient(padX, PAD_Y, padX, PAD_Y + PAD_H);
  pg.addColorStop(0, '#aaaaff'); pg.addColorStop(1, '#5555cc');
  drawRoundRect(padX, PAD_Y, paddle.w, PAD_H, 5, pg);
  ctx.shadowBlur = 0;

  // balls
  for (const ball of balls) {
    ctx.shadowColor = '#aaccff'; ctx.shadowBlur = 12;
    const bg = ctx.createRadialGradient(ball.x-2, ball.y-2, 1, ball.x, ball.y, BALL_R);
    bg.addColorStop(0, '#ffffff'); bg.addColorStop(1, '#6688ff');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;

  if (state === 'ready') {
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '13px Courier New'; ctx.textAlign = 'center';
    ctx.fillText('Space / クリック で発射', W/2, H - 12);
  }
  if (state === 'levelup') {
    ctx.fillStyle = `rgba(180,180,255,${0.15 + 0.1 * Math.sin(Date.now()/120)})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 32px Courier New'; ctx.textAlign = 'center';
    ctx.fillText('LEVEL UP!', W/2, H/2);
  }
}

// ── Loop ─────────────────────────────────────────────────
let lastTs = 0;
function gameLoop(ts) {
  const dt = ts - lastTs; lastTs = ts;
  update(dt); draw();
  animFrame = requestAnimationFrame(gameLoop);
}

function showGameOver() {
  cancelAnimationFrame(animFrame);
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `
    <h1>GAME OVER</h1>
    <div class="result-score">Score: ${score.toLocaleString()}</div>
    <div class="sub">Level ${level}</div>
    <button id="start-btn">RETRY</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('start-btn').addEventListener('click', startGame);
}

document.getElementById('start-btn').addEventListener('click', startGame);
</script>
</body>
</html>
