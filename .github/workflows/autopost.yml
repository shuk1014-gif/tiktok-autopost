name: TikTok Auto Post

on:
  schedule:
    - cron: '0 22 * * *'  # 07:00 JST
    - cron: '0 3 * * *'   # 12:00 JST
    - cron: '0 11 * * *'  # 20:00 JST
  workflow_dispatch:

permissions:
  secrets: write

jobs:
  post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tiktok-autopost

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tiktok-autopost/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore TikTok token
        env:
          TIKTOK_TOKEN_JSON: ${{ secrets.TIKTOK_TOKEN_JSON }}
        run: echo "$TIKTOK_TOKEN_JSON" > .tiktok_token.json

      - name: Post video
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_PRIVACY: ${{ secrets.TIKTOK_PRIVACY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python main.py once

      - name: Save refreshed TikTok token
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .tiktok_token.json ]; then
            gh secret set TIKTOK_TOKEN_JSON --body "$(cat .tiktok_token.json)"
          fi
